name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_ext: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_ext: '.exe'
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_ext: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_ext: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add '${{ matrix.target }}'

      - name: Build release binary
        shell: bash
        run: cargo build --release --locked --target '${{ matrix.target }}'

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          package='local-secrets-${{ matrix.target }}'
          binary='local-secrets${{ matrix.binary_ext }}'
          archive="${package}.tgz"

          mkdir -p "dist/${package}"
          cp "target/${{ matrix.target }}/release/${binary}" "dist/${package}/${binary}"
          tar -C dist -czf "dist/${archive}" "${package}"

          if command -v shasum >/dev/null 2>&1; then
            (cd dist && shasum -a 256 "${archive}" > "${archive}.sha256")
          else
            (cd dist && sha256sum "${archive}" > "${archive}.sha256")
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: local-secrets-${{ matrix.target }}
          path: |
            dist/local-secrets-${{ matrix.target }}.tgz
            dist/local-secrets-${{ matrix.target }}.tgz.sha256
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release create "$TAG_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG_NAME" \
            --generate-notes

          while IFS= read -r -d '' asset; do
            gh release upload "$TAG_NAME" "$asset" --repo "$GITHUB_REPOSITORY" --clobber
          done < <(find dist -type f \( -name '*.tgz' -o -name '*.tgz.sha256' \) -print0)
