# cargo-release configuration. Run `cargo release <level> --execute` to bump
# Cargo.toml/Cargo.lock, commit, create a vX.Y.Z tag, and push both the commit
# and tag. The pushed tag triggers .github/workflows/release.yml.
allow-branch = ["main", "master"]
pre-release-commit-message = "chore: release {{version}}"
tag-name = "v{{version}}"
tag-message = "Release {{version}}"
publish = false
push = true
tag = true
verify = true
pre-release-replacements = [
  { file = "README.md", search = "--tag v[0-9]+\\.[0-9]+\\.[0-9]+ local-secrets", replace = "--tag v{{version}} local-secrets", exactly = 1 },
]
